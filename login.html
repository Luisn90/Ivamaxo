<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IVAMAXO — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--y:#F9C200;--yd:#D9A800;--bk:#0A0A0A;--g100:#F5F5F5;--g200:#E8E8E8;--g500:#888;--wh:#fff;--f:'Montserrat',sans-serif;--r:12px;--t:all .2s ease}
body{font-family:var(--f);background:var(--bk);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:400px}
.logo-wrap{text-align:center;margin-bottom:40px}
.logo-wrap svg{height:20px;width:auto}
.card{background:var(--wh);border-radius:16px;padding:36px 32px;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.card-tag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--g500);margin-bottom:8px}
.card-title{font-size:26px;font-weight:700;letter-spacing:-.02em;margin-bottom:28px;color:var(--bk)}
.fgroup{margin-bottom:16px}
.flabel{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g500);margin-bottom:6px}
.finput{width:100%;padding:11px 14px;border:1.5px solid var(--g200);border-radius:var(--r);font-family:var(--f);font-size:13px;font-weight:500;color:var(--bk);outline:none;transition:var(--t)}
.finput:focus{border-color:var(--y);box-shadow:0 0 0 3px rgba(249,194,0,.15)}
.finput::placeholder{color:var(--g500)}
.btn-login{width:100%;padding:13px;background:var(--y);border:none;border-radius:50px;font-family:var(--f);font-size:14px;font-weight:700;color:var(--bk);cursor:pointer;transition:var(--t);margin-top:8px;letter-spacing:.01em}
.btn-login:hover{background:var(--yd);transform:scale(1.02)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error{background:#FEE;border:1px solid #FCA5A5;border-radius:var(--r);padding:10px 14px;font-size:12.5px;font-weight:600;color:#DC2626;margin-bottom:16px;display:none}
.error.show{display:block}
.back{display:block;text-align:center;margin-top:20px;font-size:12.5px;font-weight:600;color:rgba(255,255,255,.4);text-decoration:none;transition:color .2s}
.back:hover{color:var(--y)}
.loader{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:var(--bk);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-wrap">
    <svg width="160" height="21" viewBox="0 0 172 22" fill="none">
      <g clip-path="url(#ll)">
        <path d="M0 .594H5.67V21.4H0z" fill="white"/>
        <path d="M21.086 22h-.05c-2.562 0-4.75-1.536-5.794-3.89L7.459.594h6.192l7.385 17.343L28.446.594h6.192l-7.783 17.491C25.81 20.44 23.622 22 21.061 22z" fill="white"/>
        <path d="M45.133 0c2.66 0 5.073 1.536 6.167 3.865l5.57 11.892c1.591 3.394.149 5.648-3.606 5.648H41.552l3.332-5.203h5.943l-5.67-12.22-8.106 17.34h-6.267l8.23-17.54C39.91 1.511 42.572-.025 45.133-.025V0Z" fill="white"/>
        <path d="M59.654 7.333c0-4.212 2.81-7.011 7.037-7.011 2.984 0 5.42 1.833 6.192 4.583l1.939 6.764 1.94-6.764c.77-2.725 3.207-4.583 6.191-4.583 4.203 0 7.037 2.824 7.037 7.011V21.43h-5.67V6.863c0-.793-.546-1.338-1.367-1.338-.472 0-.87.297-.994.743l-4.377 15.113h-5.545l-4.376-15.113c-.124-.447-.547-.743-.994-.743-.846 0-1.368.545-1.368 1.338V21.43h-5.67V7.333Z" fill="white"/>
        <path d="M106.154 0c2.661 0 5.073 1.536 6.167 3.865l5.57 11.892c1.592 3.394.149 5.648-3.605 5.648h-11.712l3.332-5.203h5.943l-5.67-12.22-8.106 17.34h-6.267l8.23-17.54C101.131 1.511 103.593-.025 106.154-.025V0Z" fill="white"/>
        <path d="M128.808 11 119.707.594h7.51l5.197 6.318 5.197-6.318h7.51L136.02 11l9.1 10.406h-7.51l-5.197-6.318-5.197 6.318h-7.51L128.808 11Z" fill="white"/>
        <path d="M155.415.446h6.242c6.191 0 10.344 4.137 10.344 10.455 0 6.317-4.004 10.628-10.046 10.628h-6.241c-6.192 0-10.345-4.137-10.345-10.455 0-6.317 4.004-10.628 10.046-10.628ZM151.04 10.926c0 3.32 1.913 5.4 4.997 5.4h5.271c3.11 0 4.998-2.056 4.998-5.277 0-3.22-1.914-5.4-4.998-5.4h-5.27c-3.11 0-4.998 2.056-4.998 5.277Z" fill="white"/>
      </g>
      <defs><clipPath id="ll"><rect width="172" height="22" fill="white"/></clipPath></defs>
    </svg>
  </div>

  <div class="card">
    <div class="card-tag">Backoffice</div>
    <div class="card-title">Acceso administrador</div>
    <div class="error" id="errorMsg"></div>
    <div class="fgroup">
      <label class="flabel">Correo electrónico</label>
      <input class="finput" type="email" id="email" placeholder="admin@ivamaxo.com" autocomplete="email">
    </div>
    <div class="fgroup">
      <label class="flabel">Contraseña</label>
      <input class="finput" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Ingresar</button>
  </div>
  <a href="index.html" class="back">← Volver a la tienda</a>
</div>

<script>
const SB_URL = 'https://gpvugjjjbypjposqvdmo.supabase.co';
const SB_KEY = 'sb_publishable_JZAJIHL36EvC9Frwgqid_g_k9NwpUal';
const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

// Si ya hay sesión, redirigir al dashboard
sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href='dashboard.html';
});

document.getElementById('password').addEventListener('keydown', e=>{
  if(e.key==='Enter') doLogin();
});

async function doLogin(){
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const err      = document.getElementById('errorMsg');

  if(!email||!password){ showError('Completa todos los campos.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span>Ingresando...';
  err.classList.remove('show');

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if(error){
    showError('Correo o contraseña incorrectos.');
    btn.disabled = false;
    btn.textContent = 'Ingresar';
    return;
  }

  window.location.href = 'dashboard.html';
}

function showError(msg){
  const e = document.getElementById('errorMsg');
  e.textContent = msg;
  e.classList.add('show');
}
</script>
</body>
</html>
